<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
  <!-- Meta & SEO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Validate your startup idea and get a personalized 60-day roadmap with Capable. Intelligent market analysis and action plans for modern founders." />
  <meta name="theme-color" content="#ffffff" />
  <title>Capable — Build Businesses with Clarity</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Albert+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    body {
      background-color: #ffffff;
      margin: 0;
    }

    #root {
      min-height: 100vh;
    }
  </style>
  <script>
    // Console Noise Filter (suppress expected BaaS 401s for guests)
    (function() {
      const originalError = console.error;
      const originalWarn = console.warn;
      
      const noisePatterns = [
        'api/auth/refresh',
        'offsetx',
        'preloaded using link preload but not used',
        'installHook.js'
      ];

      console.error = function(...args) {
        const msg = args.join(' ').toLowerCase();
        if (noisePatterns.some(p => msg.includes(p))) return;
        originalError.apply(console, args);
      };

      console.warn = function(...args) {
        const msg = args.join(' ').toLowerCase();
        if (noisePatterns.some(p => msg.includes(p))) return;
        originalWarn.apply(console, args);
      };

      // Safety handler for uncaught errors
      window.addEventListener('error', (event) => {
        const msg = (event.error?.message || String(event)).toLowerCase();
        if (noisePatterns.some(p => msg.includes(p))) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
